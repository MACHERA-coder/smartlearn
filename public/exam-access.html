<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SmartLearn Exams</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#08255c,#1f56c5);
min-height:100vh;
padding:22px;
color:#fff;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
gap:10px;
flex-wrap:wrap;
}

.logo{
font-size:28px;
font-weight:900;
}

.btns{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.topbtn{
background:#315fb8;
color:#fff;
padding:12px 22px;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
text-decoration:none;
}

.hero{
background:rgba(255,255,255,.12);
padding:28px;
border-radius:24px;
margin-bottom:24px;
}

.hero h1{
font-size:30px;
font-weight:900;
margin-bottom:10px;
}

.hero p{
opacity:.95;
}

.card{
background:#fff;
color:#111;
border-radius:26px;
padding:24px;
}

.section-title{
font-size:24px;
font-weight:900;
margin-bottom:8px;
}

.section-sub{
color:#667085;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:18px;
}

.exam{
border:1px solid #dbe3f0;
border-radius:22px;
padding:20px;
background:#f8fbff;
}

.badge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:900;
margin-bottom:14px;
}

.live{
background:#e8fff1;
color:#0c8a45;
}

.preview{
background:#f0e9ff;
color:#7a2cff;
}

.wait{
background:#fff4d7;
color:#b26a00;
}

.exam h3{
font-size:20px;
margin-bottom:10px;
}

.meta{
line-height:1.7;
margin-bottom:16px;
}

.action{
display:block;
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:17px;
font-weight:900;
cursor:pointer;
text-decoration:none;
text-align:center;
}

.open{
background:linear-gradient(90deg,#0bba63,#10d37a);
color:#fff;
}

.upgrade{
background:linear-gradient(90deg,#7a2cff,#a53dff);
color:#fff;
}

.locked{
background:#cfd8e6;
color:#445;
cursor:not-allowed;
}

.empty{
padding:22px;
background:#eef4ff;
border-radius:18px;
font-weight:700;
color:#2452c8;
}

@media(max-width:700px){
.logo{font-size:22px;}
.hero h1{font-size:24px;}
}
</style>
</head>
<body>

<div class="topbar">
<div class="logo" id="pageTitle">Exams</div>

<div class="btns">
<a href="student-dashboard.html" class="topbtn">Back to Dashboard</a>
<a href="subscription.html" class="topbtn">Subscription</a>
</div>
</div>

<div class="hero">
<h1 id="heroTitle">Loading...</h1>
<p id="heroText">Please wait...</p>
</div>

<div class="card">
<div class="section-title" id="sectionTitle">Available Exams</div>
<div class="section-sub">Choose one exam below.</div>

<div class="grid" id="examGrid">
<div class="empty">Loading exams...</div>
</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const packageName = params.get("package") || "";
const type = params.get("type") || "preview";

const pageTitle = document.getElementById("pageTitle");
const heroTitle = document.getElementById("heroTitle");
const heroText = document.getElementById("heroText");
const sectionTitle = document.getElementById("sectionTitle");
const examGrid = document.getElementById("examGrid");

pageTitle.textContent =
type === "live"
? "Live Exams"
: type === "scheduled"
? "Scheduled Exams"
: "Preview Exams";

heroTitle.textContent =
type === "live"
? packageName + " Package Live Exams"
: type === "scheduled"
? packageName + " Package Scheduled Exams"
: packageName + " Package Preview Exams";

heroText.textContent =
type === "live"
? "Open any available live examination below."
: type === "scheduled"
? "Upcoming exams that will open soon."
: "Preview exams available for this package.";

sectionTitle.textContent =
type === "live"
? "Available Live Exams"
: type === "scheduled"
? "Available Scheduled Exams"
: "Available Preview Exams";
function esc(v){
return String(v || "").replace(/[<>&"]/g,m=>({
"<":"&lt;",
">":"&gt;",
"&":"&amp;",
'"':"&quot;"
}[m]));
}

function getStudentPackage(){
return (
localStorage.getItem("studentPackage") ||
localStorage.getItem("package") ||
localStorage.getItem("activePackage") ||
""
).trim();
}

async function getAllExams(){

const token =
localStorage.getItem("studentToken") ||
localStorage.getItem("token") ||
localStorage.getItem("authToken") ||
"";

const res = await fetch("/student/exam-links?t=" + Date.now(),{
headers:{
Authorization:`Bearer ${token}`
}
});

const data = await res.json();

if(!res.ok || !data.success){
throw new Error(data.message || "Failed to load exam links");
}

return data.examLinks || [];
}

function remaining(openTime){
  if(!openTime) return "Waiting schedule";

  const target = new Date(openTime).getTime();
  if(Number.isNaN(target)) return "Waiting schedule";

  let diff = target - Date.now();

  if(diff <= 0) return "Now open";

  const days = Math.floor(diff / 86400000);
  diff %= 86400000;

  const hrs = Math.floor(diff / 3600000);
  diff %= 3600000;

  const mins = Math.floor(diff / 60000);
  diff %= 60000;

  const secs = Math.floor(diff / 1000);

  if(days > 0){
    return `${days}d ${hrs}h ${mins}m ${secs}s`;
  }

  return `${hrs}h ${mins}m ${secs}s`;
}

async function loadData(){

try{

const all = await getAllExams();
console.log("FRONTEND EXAMS:", all);
console.log("PAGE TYPE:", type, "PACKAGE:", packageName);
const studentPackage = getStudentPackage();

const filtered = all.filter(x => {
  const pkg = String(x.package || "").trim().toLowerCase();
  const status = String(
  x.status || x.base_status || ""
).trim().toLowerCase();
console.log(x.title, status);
  const wantedPkg = String(packageName || "").trim().toLowerCase();
  const wantedType = String(type || "").trim().toLowerCase();

  if (wantedType === "live") {
    return pkg.includes(wantedPkg) && status === "live";
  }

  if (wantedType === "scheduled") {
    return pkg.includes(wantedPkg) && status === "scheduled";
  }

  if (wantedType === "preview") {
    return pkg !== wantedPkg;
  }

  return false;
});

examGrid.innerHTML = filtered.map(exam=>{

const title = esc(exam.title || exam.name || "Exam");
const status = String(exam.status || "").toLowerCase();
const link = exam.link || exam.url || "#";
const owns = type !== "preview";

if(owns && status === "live"){
return `
<div class="exam">
<div class="badge live">LIVE NOW</div>
<h3>${title}</h3>
<div class="meta">
Package: <b>${esc(packageName)}</b><br>
Status: <b>Live</b>
</div>
<a href="${link}" target="_blank" class="action open">Open Exam</a>
</div>`;
}

if(owns && status === "scheduled"){
return `
<div class="exam">
<div class="badge wait">SCHEDULED</div>
<h3>${title}</h3>
<div class="meta">
Package: <b>${esc(packageName)}</b><br>
Opens In: <b class="countdown" data-time="${exam.open_time || exam.open_time || exam.open_at || exam.start_at || exam.start_time || exam.exam_date || exam.date || ""}">Calculating...</b>
</div>
<button class="action locked" disabled>Opens soon</button>
</div>`;
}

return `
<div class="exam">
<div class="badge preview">PREVIEW</div>
<h3>${title}</h3>
<div class="meta">
Package: <b>${esc(packageName)}</b><br>
Status: <b>${esc(status || "Preview")}</b>
</div>
<a href="subscription.html" class="action upgrade">Upgrade to Access ${esc(packageName)} Package</a>
</div>`;

}).join("");

startCountdown();

}catch(err){
console.log(err);
examGrid.innerHTML =
'<div class="empty">Failed to load exams.</div>';
}
}

function startCountdown(){

setInterval(()=>{

document.querySelectorAll(".countdown").forEach(el=>{

const t = el.dataset.time;

if(!t){
el.textContent = "Waiting schedule";
return;
}

el.textContent = remaining(t);
if(remaining(t) === "Now open"){
  const card = el.closest(".exam");
  const openBtn = card?.querySelector("a.open");

  if(openBtn && openBtn.href){
    openBtn.click();
  }else{
    setTimeout(() => {
      window.location.href = `/exam-access.html?package=${encodeURIComponent(packageName)}&type=live`;
    }, 1000);
  }
}
});

},1000);

}

loadData();
</script>

</body>
</html>
